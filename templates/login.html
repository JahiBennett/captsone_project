<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Portal - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(to bottom, #ffffff 50%, #f5f5f5 50%);
        }

        /* Top Half with Green Border */
        .header-section {
            position: relative;
            height: 50vh;
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .logo-container {
            text-align: center;
            color: white;
            animation: fadeInDown 1s ease-in-out;
        }

        .logo {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            font-size: 48px;
            font-weight: bold;
            color: #27ae60;
        }

        .business-name {
            font-size: 42px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            letter-spacing: 2px;
        }

        .tagline {
            font-size: 16px;
            margin-top: 10px;
            opacity: 0.95;
            font-weight: 300;
        }

        /* Login Container */
        .login-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.15);
            width: 420px;
            max-width: 90%;
            z-index: 100;
            animation: fadeInUp 0.8s ease-in-out;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h2 {
            color: #2c3e50;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .user-type-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .user-type-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 600;
            color: #7f8c8d;
        }

        .user-type-btn:hover {
            border-color: #27ae60;
            color: #27ae60;
            transform: translateY(-2px);
        }

        .user-type-btn.active {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            border-color: #27ae60;
            color: white;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 500;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #27ae60;
            box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.1);
        }

        .login-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
            margin-top: 10px;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(46, 204, 113, 0.4);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .message {
            text-align: center;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
            font-size: 14px;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #7f8c8d;
        }

        .register-link a {
            color: #27ae60;
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translate(-50%, -45%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }

        /* Demo credentials info */
        .demo-info {
            background: #e8f5e9;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 12px;
            color: #2e7d32;
            border-left: 4px solid #27ae60;
        }

        .demo-info strong {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .demo-info div {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <!-- Top Half with Logo and Business Name -->
    <div class="header-section">
        <div class="logo-container">
            <div class="logo">JP</div>
            <div class="business-name">JOB PORTAL</div>
            <div class="tagline">Connecting Talent with Opportunity</div>
        </div>
    </div>

    <!-- Login Container (Centered) -->
    <div class="login-container">
        <div class="login-header">
            <h2>Welcome Back</h2>
            <p style="color: #7f8c8d; font-size: 14px;">Please login to continue</p>
        </div>

        <div id="message" class="message"></div>

        <!-- User Type Selection -->
        <div class="user-type-selector">
            <button type="button" class="user-type-btn active" data-type="job_seeker">
                Job Seeker
            </button>
            <button type="button" class="user-type-btn" data-type="employer">
                Employer
            </button>
        </div>

        <!-- Login Form -->
        <form id="loginForm">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter your username">
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>

            <button type="submit" class="login-button">Login</button>
        </form>

        <div class="register-link">
            Don't have an account? <a href="#" id="registerLink">Register here</a>
        </div>

        <!-- Demo Credentials -->
        <div class="demo-info">
            <strong>📝 Demo Credentials:</strong>
            <div><strong>Job Seeker:</strong> jobseeker1 / password123</div>
            <div><strong>Employer:</strong> employer1 / password123</div>
        </div>
    </div>

    <script>
        // User type selection
        let selectedUserType = 'job_seeker';
        
        document.querySelectorAll('.user-type-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.user-type-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                selectedUserType = this.dataset.type;
            });
        });

        // Login form submission
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        user_type: selectedUserType
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage('Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = data.redirect;
                    }, 1000);
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (error) {
                showMessage('An error occurred. Please try again.', 'error');
            }
        });

        // Register link (placeholder)
        document.getElementById('registerLink').addEventListener('click', function(e) {
            e.preventDefault();
            alert('Registration page would open here. For demo, use the provided credentials.');
        });

        // Helper function to show messages
        function showMessage(message, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = message;
            messageDiv.className = 'message ' + type;
            messageDiv.style.display = 'block';
            
            if (type === 'success') {
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 3000);
            }
        }
    </script>
</body>
</html>
